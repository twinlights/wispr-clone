[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "W",      # pycodestyle warnings
    "I",      # isort
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "UP",     # pyupgrade
]
ignore = [
    "E501",   # line too long — some docstrings exceed 100 chars
    "B904",   # bare `except Exception` — intentional for desktop robustness
    "SIM108", # use ternary — not always clearer
    "SIM114", # combine if branches — not always clearer
]

[tool.ruff.lint.isort]
known-first-party = ["wispr_clone"]

